services:
  caddy:
    image: caddy:2.8-alpine
    container_name: endurance_caddy
    mem_limit: 128m
    depends_on:
      - edge
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_HOST: ${APP_HOST:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
      ROOT_HOST: ${ROOT_HOST:-origamiplans.com}
      WWW_HOST: ${WWW_HOST:-www.origamiplans.com}
    volumes:
      - ./deployment/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - public
      - private

  edge:
    image: nginx:1.27-alpine
    container_name: endurance_edge
    mem_limit: 128m
    depends_on:
      - frontend
      - backend
    volumes:
      - ./deployment/nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - public
      - private

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_API_TIMEOUT_MS: ${VITE_API_TIMEOUT_MS:-15000}
    container_name: endurance_frontend
    mem_limit: 128m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - private

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: endurance_backend
    mem_limit: 768m
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      INTEGRATIONS_TOKEN_ENCRYPTION_KEY: ${INTEGRATIONS_TOKEN_ENCRYPTION_KEY}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTO_SEED_DEMO: ${AUTO_SEED_DEMO:-false}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-300}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      ENABLE_STRAVA_INTEGRATION: ${ENABLE_STRAVA_INTEGRATION:-true}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      STRAVA_REDIRECT_URI: ${STRAVA_REDIRECT_URI:-}
      STRAVA_WEBHOOK_CALLBACK_URL: ${STRAVA_WEBHOOK_CALLBACK_URL:-}
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN:-}
    volumes:
      - uploads_data:/app/uploads
    command: >
      sh -c "python -m app.wait_for_db &&
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers ${UVICORN_WORKERS:-2}
      --proxy-headers
      --forwarded-allow-ips='*'"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - private

volumes:
  uploads_data:
  caddy_data:
  caddy_config:

networks:
  public:
  private:
