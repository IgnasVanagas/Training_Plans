name: Coverage Gate

on:
  pull_request:
  push:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run backend coverage
        working-directory: backend
        run: python -m pytest app/tests --cov=app --cov-config=.coveragerc --cov-fail-under=60 --cov-report=term-missing --cov-report=json:coverage.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Check combined coverage threshold
        run: node scripts/check-coverage.mjs