upstream frontend_upstream {
    server frontend:80;
    keepalive 32;
}

upstream backend_upstream {
    server backend:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # Re-resolve Docker service DNS records to avoid stale upstream IPs after container recreation.
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 64m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml image/svg+xml;
    gzip_min_length 1024;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location /api/ {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 15s;
        proxy_send_timeout 120s;
        set $backend_origin http://backend:8000;
        proxy_pass $backend_origin;
    }

    location /uploads/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        set $backend_uploads http://backend:8000;
        proxy_pass $backend_uploads/uploads/;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        set $frontend_origin http://frontend:80;
        proxy_pass $frontend_origin;
    }
}
