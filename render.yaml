services:
  - type: web
    name: training-plans-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    rootDir: backend
    plan: starter
    autoDeployTrigger: commit
    healthCheckPath: /health
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 5
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: training-plans-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: INTEGRATIONS_TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAMESITE
        value: "none"
      - key: EXPOSE_AUTH_DEBUG_LINKS
        value: "false"
      - key: AUTO_SEED_DEMO
        value: "false"
      - key: FRONTEND_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ENABLE_STRAVA_INTEGRATION
        value: "true"
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_REDIRECT_URI
        sync: false
      - key: STRAVA_WEBHOOK_VERIFY_TOKEN
        sync: false

  - type: web
    name: training-plans-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_API_TIMEOUT_MS
        value: "15000"

databases:
  - name: training-plans-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "17"
    databaseName: endurance
    user: app